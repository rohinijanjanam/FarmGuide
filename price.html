{% extends "layout.html" %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmGuide🌾 - Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="header">
        <h1>Price Prediction 📊</h1>
    </header>
    <main class="container price-main">
        <!-- Crop dropdown selection -->
        <label for="cropSelect" class="dropdown-label">Select Crop:</label>
        <select id="cropSelect">
            <option value="">--Choose--</option>
            <option value="wheat">Wheat</option>
            <option value="rice">Rice</option>
            <option value="maize">Maize</option>
	    <option value="corn">corn</option>
	    <option value="cotton">cotton</option>
            <option value="soybean">Soybean</option>
        </select>
        <!-- Price display area -->
        <section id="priceInfo" class="price-section">
            <!-- Prices will be shown here -->
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2026 FarmGuide.</p>
    </footer>
    <script>
    // Demo: Price prediction
    const prices = {
        wheat: { current: "₹2100/q", predicted: "₹2250/q" },
        rice:  { current: "₹1800/q", predicted: "₹1920/q" },
        maize: { current: "₹1550/q", predicted: "₹1600/q" },
 	corn: { current: "₹1850/q", predicted: "₹1790/q" },
        soybean: { current: "₹4200/q", predicted: "₹4500/q" }
    };
    document.getElementById('cropSelect').addEventListener('change', function(){
        const crop = this.value;
        const info = document.getElementById('priceInfo');
        if(crop && prices[crop]){
            info.innerHTML = `
                <p><b>Current Price:</b> ${prices[crop].current}</p>
                <p><b>Predicted Price in future:</b> ${prices[crop].predicted}</p>
            `;
        } else {
            info.innerHTML = "<p>Please select a crop to view prices.</p>";
        }
    });
    </script>


</body>
{% endblock %}
