{% extends "layout.html" %}
{% block content %}

<header class="header">
    <h1>Scan Crop 🌿</h1>
</header>

<main class="scan-main">

    <form id="scanForm" autocomplete="off">
        <div class="upload-box">
            <span class="upload-icon">📷</span>

            <label for="cropImage" class="upload-label">
                Tap to Upload Crop Image
            </label>

            <input type="file" id="cropImage" class="hidden-input" accept="image/*" required>

            <img id="imgPreview" class="preview-img">

            <button type="submit" class="action-btn">Analyze</button>
        </div>
    </form>

    <section id="resultSection" class="result-section"></section>

</main>


<!-- FIXED SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<footer class="footer">
    <p>&copy; 2026 FarmGuide.</p>
</footer>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/vqwiSZ3gB/";

let model;
let modelLoaded = false;

// 🔥 SOLUTIONS DATABASE
const solutions = {

    "Leaf Spot": `
    🦠 <b>Disease:</b> Leaf Spot<br>
    <b>Cause:</b> Fungal infection due to moisture<br>
    <b>Treatment:</b> Apply fungicide (Mancozeb / Chlorothalonil)<br>
    <b>Prevention:</b> Avoid overhead watering and improve airflow
    `,

    "Black Rot": `
    ⚠️ <b>Disease:</b> Black Rot<br>
    <b>Cause:</b> Bacterial infection<br>
    <b>Treatment:</b> Use copper-based bactericide<br>
    <b>Fertilizer:</b> Apply balanced NPK to strengthen plant<br>
    <b>Prevention:</b> Remove infected plants and sanitize tools
    `,

    "Brown Spot": `
    🌿 <b>Disease:</b> Brown Spot<br>
    <b>Cause:</b> Nutrient deficiency + fungal infection<br>
    <b>Treatment:</b> Apply fungicide (Carbendazim)<br>
    <b>Fertilizer:</b> Use potassium-rich fertilizer<br>
    <b>Prevention:</b> Maintain soil fertility and spacing
    `,

    "Rust": `
    🟤 <b>Disease:</b> Rust<br>
    <b>Cause:</b> Fungal spores in humid conditions<br>
    <b>Treatment:</b> Apply sulfur-based fungicide<br>
    <b>Prevention:</b> Remove infected leaves and avoid crowding
    `,

    "Bacteria": `
    🧫 <b>Disease:</b> Bacterial Infection<br>
    <b>Cause:</b> Water splashing and infected tools<br>
    <b>Treatment:</b> Use copper oxychloride spray<br>
    <b>Prevention:</b> Avoid overhead irrigation and disinfect tools
    `,

    "Mosaic Virus": `
    🦠 <b>Disease:</b> Mosaic Virus<br>
    <b>Cause:</b> Virus spread by aphids<br>
    <b>Treatment:</b> ❌ No cure available<br>
    <b>Control:</b> Use neem oil or imidacloprid to control insects<br>
    <b>Prevention:</b> Remove infected plants immediately
    `
};
// Load model
async function loadModel() {
    if (modelLoaded) return;

    const modelURL = MODEL_URL + "model.json";
    const metadataURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    modelLoaded = true;

    console.log("Model loaded");
}

// Preview image
document.getElementById('cropImage').addEventListener('change', function() {
    const preview = document.getElementById('imgPreview');
    const file = this.files[0];

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});

// Analyze
document.getElementById('scanForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const resultSection = document.getElementById('resultSection');
    const image = document.getElementById('imgPreview');

    if (!modelLoaded) {
        resultSection.innerHTML = "⏳ Model still loading...";
        return;
    }

    resultSection.innerHTML = "🔍 Analyzing...";

    const prediction = await model.predict(image);

    // 🔥 FIND BEST RESULT
    let best = prediction.reduce((max, p) =>
        p.probability > max.probability ? p : max
    );

    const disease = best.className;
    const confidence = (best.probability * 100).toFixed(2);
    const solution = solutions[disease] || "No specific solution available.";

    // 🔥 FINAL OUTPUT
    let solutionText = "";

if (disease === "Healthy") {
    solutionText = "✅ Your plant is healthy. No treatment needed.";
} else {
    solutionText = solutions[disease] || "No specific solution available.";
}

resultSection.innerHTML = `
    <h2>🌿 Detected: ${disease}</h2>
    <p><b>Confidence:</b> ${confidence}%</p>
    <div class="solution-box">
        ${solutionText}
    </div>
`;
    // ⚠️ LOW CONFIDENCE WARNING
    if (confidence < 60) {
        resultSection.innerHTML += `<p style="color:red;">⚠️ Low confidence. Try clearer image.</p>`;
    }
});

// Load model when page opens
window.onload = function() {
    loadModel();
};
</script>

{% endblock %}
