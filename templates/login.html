<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FarmGuide</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌿 Background Image */
body {
    height: 100vh;
    background: url("/static/bg.jpg") no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🌫 Glass Effect Container */
.login-box {
    width: 320px;
    padding: 2rem;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    text-align: center;
}

/* Title */
.login-box h2 {
    margin-bottom: 1.5rem;
    color: #fff;
}

/* Inputs */
.input-box {
    margin-bottom: 1rem;
    text-align: left;
}

.input-box label {
    color: #fff;
    font-size: 0.9rem;
}

.input-box input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Remember */
.remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 0.85rem;
    margin: 10px 0;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #29a745;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #218838;
}
.app-title {
    position: absolute;
    top: 120px;   /* adjust this value if needed */
    font-size: 2.6rem;
    font-weight: bold;
    color: #ffe6e6;
    text-align: center;
    width: 100%;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}
.signup-text {
  margin-top: 16px;
  font-size: 14px;
  color: #000;
}

.signup-link {
  color: #000; /* Default black */
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s, text-decoration-color 0.2s;
}

.signup-link:hover {
  color: #1976d2; /* Or your desired blue */
  text-decoration: underline;
  text-decoration-color: #1976d2;
}

</style>
</head>

<body>
<h1 class="app-title">FarmGuide🌾</h1>
<div class="login-box">
    <h2>Sign In</h2>

    <form method="POST" action="/">
        
        <div class="input-box">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-box">
            <label>Password:</label>
            <input type="password" name="password" required>
        </div>

        <div class="remember">
            <input type="checkbox">
            <span>Remember me</span>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
	<div class="signup-text">
  <span>Don't have an account? </span>
  <a href="/signup" class="signup-link">Sign up</a>
</div>


    </form>
</div>

</body>
</html>
